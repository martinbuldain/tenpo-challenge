spring:
  # R2DBC datasource → usado por Spring Data R2DBC en runtime
  # Overrideado vía @DynamicPropertySource en los tests de integración
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/tenpo_test
    username: tenpo
    password: tenpo_pass

  # JDBC datasource → solo para Flyway (migración de esquema)
  # Overrideado vía @DynamicPropertySource en los tests de integración
  datasource:
    url: jdbc:postgresql://localhost:5432/tenpo_test
    username: tenpo
    password: tenpo_pass

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/tenpo_test
    user: tenpo
    password: tenpo_pass

  # Redis apunta a Testcontainer (override via @DynamicPropertySource)
  data:
    redis:
      host: localhost
      port: 6379

app:
  external-service:
    # MockServer override via @DynamicPropertySource
    url: http://localhost:1080/mock/percentage
    connect-timeout-ms: 2000
    read-timeout-ms: 3000

  mock:
    percentage: 10

  cache:
    percentage-ttl-minutes: 1  # TTL corto para tests

  rate-limit:
    max-requests-per-minute: 1000
    window-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      externalPercentage:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        minimum-number-of-calls: 3

logging:
  level:
    root: WARN
    com.tenpo.challenge: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
