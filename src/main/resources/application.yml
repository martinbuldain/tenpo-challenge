server:
  port: 8080

spring:
  application:
    name: tenpo-challenge

  # R2DBC (acceso reactivo a PostgreSQL)
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/tenpo_db}
    username: ${DB_USERNAME:tenpo}
    password: ${DB_PASSWORD:tenpo_pass}
    pool:
      initial-size: 2
      max-size: 10
      max-idle-time: 30m

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tenpo_db}
    username: ${DB_USERNAME:tenpo}
    password: ${DB_PASSWORD:tenpo_pass}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tenpo_db}
    user: ${DB_USERNAME:tenpo}
    password: ${DB_PASSWORD:tenpo_pass}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

app:
  external-service:
    url: ${EXTERNAL_SERVICE_URL:http://localhost:8080/mock/percentage}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

  mock:
    percentage: 10

  cache:
    percentage-ttl-minutes: 30

  rate-limit:
    max-requests-per-minute: 3
    window-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      externalPercentage:
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - com.tenpo.challenge.exception.ExternalServiceException
          - org.springframework.web.reactive.function.client.WebClientException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tenpo.challenge: DEBUG
    io.r2dbc: WARN
    reactor.netty: WARN
